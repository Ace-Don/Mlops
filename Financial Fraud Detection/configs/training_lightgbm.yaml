# Fraud Detection — LightGBM Training Config
# Pipeline: fraud_training_pipeline with model_type='lightgbm'

model:
  name: fraud_detection_model

parameters:
  target: "fraud"
  model_type: "lightgbm"
  min_train_accuracy: 0.80
  min_test_accuracy: 0.80
  
  # SMOTE hyperparameters
  smote_k_neighbors: 5
  smote_sampling_strategy: 0.8
  
  # LightGBM hyperparameters
  lgb_n_estimators: 100
  lgb_num_leaves: 31
  lgb_learning_rate: 0.1
  lgb_subsample: 1.0
  lgb_colsample_bytree: 1.0
  lgb_reg_alpha: 0.0
  lgb_reg_lambda: 0.0
