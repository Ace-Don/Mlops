# environment configuration
settings:
  docker:
    required_integrations:
      - sklearn
      - xgboost
      - lightgbm
      - mlflow
    requirements:
      - pyarrow
      - catboost
      - pandas

# configuration of the Model Control Plane
model:
  name: financial_fraud_classifier
  version: xgb
  license: Apache 2.0
  description: A financial fraud classifier using XGBoost
  tags: ["fraud_detection", "classifier", "xgb"]

# Configure the pipeline
parameters:
  model_type: "xgb"
  target: "fraud"

# Enable caching for steps
steps:
  model_trainer:
    enable_cache: True
  model_evaluator:
    enable_cache: True
