# Fraud Detection — XGBoost Training Config
# Pipeline: fraud_training_pipeline with model_type='xgb'

model:
  name: fraud_detection_model

parameters:
  target: "fraud"
  model_type: "xgb"
  min_train_accuracy: 0.80
  min_test_accuracy: 0.80
  
  # SMOTE hyperparameters
  smote_k_neighbors: 5
  smote_sampling_strategy: 0.8
  
  # XGBoost hyperparameters
  xgb_n_estimators: 100
  xgb_max_depth: 3
  xgb_learning_rate: 0.1
  xgb_subsample: 1.0
  xgb_colsample_bytree: 1.0
  xgb_scale_pos_weight: 1.0
  xgb_eval_metric: "logloss"
